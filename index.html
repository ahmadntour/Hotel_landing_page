<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انضم إلى منصتنا - لحجز الفنادق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #e7f1ff;
            --white: #ffffff;
            --text-dark: #333;
            --gray: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            border-bottom: 1px solid var(--gray);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .hero {
            padding: 80px 10%;
            text-align: center;
            background: linear-gradient(to bottom, var(--light-blue), var(--white));
        }

        .hero h1 {
            font-size: 2.5rem;
            color: var(--primary-blue);
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 30px;
        }

        .form-container {
            max-width: 500px;
            margin: -50px auto 50px;
            background: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--light-blue);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Tajawal', sans-serif;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #004494;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">منصة الحجز</div>
    </header>

    <section class="hero">
        <h1>وسع نطاق وصول فندقك</h1>
        <p>كن من الأوائل المنضمين إلى منصتنا القادمة واحصل على ميزات حصرية وعمولات مخفضة عند الإطلاق.</p>
    </section>

    <div class="form-container">
        <form id="hotel-form">
            <div class="form-group">
                <label>اسم الفندق</label>
                <input type="text" placeholder="أدخل اسم الفندق" required>
            </div>
            <div class="form-group">
                <label>موقع الفندق (المدينة)</label>
                <input type="text" placeholder="مثال: الرياض، دبي" required>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني للتواصل</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="tel" placeholder="+966..." required>
            </div>
            <button type="submit">سجل اهتمامك الآن</button>
        </form>
    </div>

    <footer>
        &copy; 2026 جميع الحقوق محفوظة لمنصة الحجز.
    </footer>

</body>
</html>
