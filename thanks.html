<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لانضمامك | BookiDays</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fbff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 86, 179, 0.1);
            max-width: 500px;
        }
        .icon {
            font-size: 60px;
            color: #0056b3;
            margin-bottom: 20px;
        }
        h1 { color: #0056b3; margin-bottom: 10px; }
        p { color: #636e72; line-height: 1.6; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #0056b3;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #003d82; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>تم استلام طلبكم بنجاح!</h1>
        <p>شكراً لاهتمامكم بالانضمام إلى <strong>BookiDays</strong> حلب. سيقوم فريقنا بمراجعة البيانات والتواصل معكم قريباً عبر الواتساب لتأكيد الشراكة.</p>
        <a href="index.html" class="btn">العودة للرئيسية</a>
    </div>
</body>
</html>
